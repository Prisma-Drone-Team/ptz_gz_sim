# This config file is used by ros2_control for PTZ camera
controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    ptz_controller:
      type: position_controllers/JointGroupPositionController

    position_controller:
      type: position_controllers/JointGroupPositionController
    
    velocity_controller:
      type: velocity_controllers/JointGroupVelocityController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

ptz_controller:
  ros__parameters:
    joints:
      - pan_joint
      - tilt_joint

position_controller:
  ros__parameters:
    joints:
      - pan_joint
      - tilt_joint

velocity_controller:
  ros__parameters:
    joints:
      - pan_joint
      - tilt_joint

joint_state_broadcaster:
  ros__parameters:
    frame_id: axis_camera_frame
    joints:
      - pan_joint
      - tilt_joint